<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/assets/M02.png" />
    <link rel="apple-touch-icon" href="/assets/M02.png" />
    <title>Monastery Club</title>
    <style>
      body { margin: 0; background: #0A0A0A; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #0A0A0A;
        transition: opacity 0.5s ease;
      }
      #splash.fade-out { opacity: 0; pointer-events: none; }
      #splash img {
        width: 90px; height: 90px;
        animation: pulse-glow 1.8s ease-in-out infinite;
      }
      #splash p {
        margin-top: 18px; color: rgba(255,255,255,0.35);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
      }
      #splash .bar-wrap {
        margin-top: 24px; width: 160px; height: 3px;
        background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden;
      }
      #splash .bar {
        height: 100%; width: 30%; border-radius: 3px;
        background: linear-gradient(90deg, #D4AF37, #F5D76E);
        animation: slide 1.2s ease-in-out infinite;
      }
      @keyframes pulse-glow {
        0%, 100% { filter: drop-shadow(0 0 8px rgba(212,175,55,0.3)); transform: scale(1); }
        50% { filter: drop-shadow(0 0 20px rgba(212,175,55,0.6)); transform: scale(1.05); }
      }
      @keyframes slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(530%); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/assets/M02.png" alt="Monastery Club" />
      <p>Monastery Club</p>
      <div class="bar-wrap"><div class="bar"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
